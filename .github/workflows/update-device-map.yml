name: update-device-map

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install cargo-release
        run: cargo install cargo-release --locked

      - name: Install Linux system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libudev-dev libxdo-dev

      - name: Clone OpenRazer master
        id: openrazer
        run: |
          set -euo pipefail
          git clone --depth 1 --branch master https://github.com/openrazer/openrazer "$RUNNER_TEMP/openrazer"
          echo "openrazer_sha=$(git -C "$RUNNER_TEMP/openrazer" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Regenerate device map
        run: |
          set -euo pipefail
          python3 tools/extract_openrazer_map.py "$RUNNER_TEMP/openrazer" src/device_map.rs
          rustfmt src/device_map.rs

      - name: Detect map changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- src/device_map.rs; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        id: bump
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cargo release version patch --execute --no-confirm
          new_version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: cargo test --all-targets

      - name: Commit changes
        id: commit
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          branch="ci/device-map-sync"
          openrazer_sha="${{ steps.openrazer.outputs.openrazer_sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$branch"
          git add src/device_map.rs Cargo.toml Cargo.lock

          if git diff --cached --quiet; then
            echo "has_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: update device ids to OpenRazer ${openrazer_sha:0:12}"
          git push --force-with-lease origin "$branch"
          echo "has_commit=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true' && steps.commit.outputs.has_commit == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="ci/device-map-sync"
          base="${{ github.event.repository.default_branch }}"
          openrazer_sha="${{ steps.openrazer.outputs.openrazer_sha }}"
          new_version="${{ steps.bump.outputs.new_version }}"
          short_sha="${openrazer_sha:0:12}"

          title="chore: update device ids to OpenRazer ${short_sha}"
          cat > /tmp/pr-body.md <<EOF
          ## Summary
          - regenerate \`src/device_map.rs\` from OpenRazer \`${openrazer_sha}\`
          - bump package version to \`${new_version}\` (patch)

          ## Notes
          - generated by \`.github/workflows/update-device-map.yml\`
          - schedule uses \`0 8 * * 1\` UTC
          EOF

          pr_number=$(gh pr list --state open --head "$branch" --base "$base" --json number --jq '.[0].number // empty')

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$title" --body-file /tmp/pr-body.md
          else
            gh pr create --base "$base" --head "$branch" --title "$title" --body-file /tmp/pr-body.md
          fi
