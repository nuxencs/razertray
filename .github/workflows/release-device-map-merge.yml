name: release-device-map-merge

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'ci/device-map-sync' &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: windows-latest
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Read release version
        id: version
        shell: pwsh
        run: |
          $cargoToml = Get-Content Cargo.toml -Raw
          $packageSection = [regex]::Match($cargoToml, '(?ms)^\[package\]\s*(?<body>.*?)(?=^\[|\z)')
          if (-not $packageSection.Success) {
            throw "Failed to parse [package] section from Cargo.toml"
          }

          $match = [regex]::Match($packageSection.Groups['body'].Value, '(?m)^version\s*=\s*"(?<version>\d+\.\d+\.\d+)"\s*$')
          if (-not $match.Success) {
            throw "Failed to parse package version from Cargo.toml"
          }

          $version = $match.Groups['version'].Value
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Ensure release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($existingTag) {
            throw "Tag '$tag' already exists. Refusing duplicate release."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release '$tag' already exists. Refusing duplicate release."
          }

      - name: Create and push tag
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare release assets
        shell: pwsh
        run: |
          $exe = "target/x86_64-pc-windows-msvc/release/razertray.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected binary not found at $exe"
          }

          Copy-Item $exe razertray.exe
          $hash = (Get-FileHash razertray.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  razertray.exe" | Set-Content SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $prNumber = "${{ github.event.pull_request.number }}"
          gh release create $tag razertray.exe SHA256SUMS.txt --title $tag --notes "Automated release for merged device-map PR #$prNumber"
