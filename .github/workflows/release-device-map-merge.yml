name: release-device-map-merge

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'ci/device-map-sync' &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: windows-latest
    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Read release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Ensure release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
            echo "::error::Tag '$tag' already exists. Refusing duplicate release."
            exit 1
          fi

          if gh release view "$tag" > /dev/null 2>&1; then
            echo "::error::Release '$tag' already exists. Refusing duplicate release."
            exit 1
          fi

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare release assets
        shell: pwsh
        run: |
          $exe = "target/x86_64-pc-windows-msvc/release/razertray.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected binary not found at $exe"
          }

          Copy-Item $exe razertray.exe
          $hash = (Get-FileHash razertray.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  razertray.exe" | Set-Content SHA256SUMS.txt

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          prev_tag=$(git describe --tags --abbrev=0 "$tag^" 2>/dev/null || echo "")

          if [ -n "$prev_tag" ]; then
            log=$(git log "${prev_tag}..${tag}" --pretty=format:"- %s (%h)" --no-merges)
          else
            log=$(git log "$tag" --pretty=format:"- %s (%h)" --no-merges)
          fi

          {
            echo 'body<<CHANGELOG_EOF'
            echo "## What's Changed"
            echo ""
            echo "$log"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag:-$(git rev-list --max-parents=0 HEAD | head -1)}...${tag}"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          pr_number="${{ github.event.pull_request.number }}"
          gh release create "$tag" razertray.exe SHA256SUMS.txt \
            --title "$tag" \
            --notes "${{ steps.changelog.outputs.body }}"
