name: release-on-tag

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Validate tag matches Cargo version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Tag '$tag' must match vX.Y.Z"
          }

          $cargoToml = Get-Content Cargo.toml -Raw
          $packageSection = [regex]::Match($cargoToml, '(?ms)^\[package\]\s*(?<body>.*?)(?=^\[|\z)')
          if (-not $packageSection.Success) {
            throw "Failed to parse [package] section from Cargo.toml"
          }

          $match = [regex]::Match($packageSection.Groups['body'].Value, '(?m)^version\s*=\s*"(?<version>\d+\.\d+\.\d+)"\s*$')
          if (-not $match.Success) {
            throw "Failed to parse package version from Cargo.toml"
          }

          $expected = "v$($match.Groups['version'].Value)"
          if ($tag -ne $expected) {
            throw "Tag '$tag' does not match Cargo.toml version '$expected'"
          }

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare release assets
        shell: pwsh
        run: |
          $exe = "target/x86_64-pc-windows-msvc/release/razertray.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected binary not found at $exe"
          }

          Copy-Item $exe razertray.exe
          $hash = (Get-FileHash razertray.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  razertray.exe" | Set-Content SHA256SUMS.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated release for $tag"
          }

          gh release upload $tag razertray.exe SHA256SUMS.txt --clobber
